<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXTRATOR</title>
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;padding:16px}
input,textarea{width:100%;box-sizing:border-box}
textarea{height:220px;margin-top:10px;font-size:15px;padding:8px}
img{width:100%;margin-top:15px;border-radius:8px}
.bloco{background:white;padding:12px;margin-top:15px;border-radius:8px;border:1px solid #ccc}
.linha{font-family:monospace;background:#eee;padding:8px;margin:5px 0;border-radius:5px;white-space:pre-wrap}
.tabela-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:760px}
th,td{border:1px solid #ccc;padding:6px;text-align:left}
th{background:#1a3a5c;color:white}
#status{margin-top:15px;font-weight:bold;font-size:18px}
#resumo{margin-top:8px;font-size:15px;color:#333}
.botoes{display:flex;gap:8px;margin-top:12px}
.botoes button{flex:1;padding:12px;font-size:15px;border:none;border-radius:8px;color:white;cursor:pointer}
#btnExcel{background:#1a7a3c}
#btnLimpar{background:#9c2a2a}
</style>
</head>

<body>

<h2>EXTRATOR</h2>

<input type="file" id="imagem" accept="image/*" capture="environment">

<div class="botoes">
<button id="btnExcel" type="button">Gerar Excel</button>
<button id="btnLimpar" type="button">Limpar tudo</button>
</div>

<div id="status">Aguardando imagem...</div>
<div id="resumo"></div>

<img id="preview">

<div class="bloco">
<h3>Pedidos extraídos (todas as folhas)</h3>
<div class="tabela-wrap">
<table>
<thead>
<tr>
<th>Pág</th>
<th>OF</th>
<th>Qtd</th>
<th>Largura</th>
<th>Comprimento</th>
<th>Papel</th>
<th>Onda</th>
<th>Gramatura</th>
<th>Vinco</th>
<th>Ino</th>
</tr>
</thead>
<tbody id="tabelaPedidos"></tbody>
</table>
</div>
</div>

<div class="bloco">
<h3>Linhas prováveis (última folha)</h3>
<div id="linhasPedido"></div>
</div>

<div class="bloco">
<h3>Texto OCR completo (última folha)</h3>
<textarea id="resultado"></textarea>
</div>

<script>
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js");
}

const input = document.getElementById("imagem");
const preview = document.getElementById("preview");
const resultado = document.getElementById("resultado");
const status = document.getElementById("status");
const resumo = document.getElementById("resumo");
const linhasPedidoDiv = document.getElementById("linhasPedido");
const tabelaPedidos = document.getElementById("tabelaPedidos");
const btnExcel = document.getElementById("btnExcel");
const btnLimpar = document.getElementById("btnLimpar");

let todosPedidos = [];
let contadorPagina = 0;

input.addEventListener("change", async e => {
    const arquivo = e.target.files[0];
    if(!arquivo) return;

    contadorPagina++;
    const paginaAtual = contadorPagina;

    preview.src = URL.createObjectURL(arquivo);
    status.innerHTML = "Lendo folha " + paginaAtual + "... aguarde.";
    resultado.value = "";
    linhasPedidoDiv.innerHTML = "";

    try{
        const resposta = await Tesseract.recognize(arquivo, "por+eng");
        const texto = resposta.data.text || "";

        resultado.value = texto;

        const linhas = obterLinhasProvaveis(texto);
        mostrarLinhas(linhas);

        const pedidos = extrairPedidos(texto);
        pedidos.forEach(p => p.pagina = paginaAtual);
        todosPedidos = todosPedidos.concat(pedidos);

        mostrarPedidos(todosPedidos);
        atualizarResumo();

        status.innerHTML = "Folha " + paginaAtual + " concluída. Pode tirar a próxima.";
    }catch(erro){
        status.innerHTML = "Erro no OCR da folha " + paginaAtual + ".";
        resultado.value = erro.message || erro;
    }finally{
        input.value = "";
    }
});

btnLimpar.addEventListener("click", () => {
    todosPedidos = [];
    contadorPagina = 0;
    tabelaPedidos.innerHTML = "";
    linhasPedidoDiv.innerHTML = "";
    resultado.value = "";
    preview.removeAttribute("src");
    status.innerHTML = "Lista zerada. Aguardando imagem...";
    resumo.innerHTML = "";
});

btnExcel.addEventListener("click", gerarExcel);

function atualizarResumo(){
    resumo.innerHTML = "Folhas processadas: " + contadorPagina + " | Itens na lista: " + todosPedidos.length;
}

function gerarExcel(){
    if(todosPedidos.length === 0){
        status.innerHTML = "Nenhum pedido para exportar.";
        return;
    }
    if(typeof XLSX === "undefined"){
        status.innerHTML = "Biblioteca do Excel não carregou. Verifique a internet e recarregue.";
        return;
    }

    const dados = todosPedidos.map(p => ({
        "Pág": p.pagina || "",
        "OF": p.of || "",
        "Qtd": p.quantidade ? Number(p.quantidade) : "",
        "Largura": p.largura ? Number(p.largura) : "",
        "Comprimento": p.comprimento ? Number(p.comprimento) : "",
        "Papel": p.papel || "",
        "Onda": p.onda || "",
        "Gramatura": p.gramatura ? Number(p.gramatura) : "",
        "Vinco": p.vinco || "",
        "Ino": p.ino || ""
    }));

    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Pedidos");

    const agora = new Date();
    const nome = "pedidos_" +
        agora.getFullYear() +
        String(agora.getMonth() + 1).padStart(2, "0") +
        String(agora.getDate()).padStart(2, "0") + "_" +
        String(agora.getHours()).padStart(2, "0") +
        String(agora.getMinutes()).padStart(2, "0") + ".xlsx";

    XLSX.writeFile(wb, nome);
    status.innerHTML = "Excel gerado: " + nome;
}

function obterLinhasProvaveis(texto){
    return texto
        .split(/\n+/)
        .map(l => l.trim())
        .filter(l => l.length > 0)
        .filter(linha => {
            const l = linha.toLowerCase();
            return (
                l.includes("chapa") ||
                l.includes("chapas") ||
                l.includes("chaps") ||
                l.includes("vinco") ||
                l.includes("vincos") ||
                l.includes("of") ||
                l.includes("p25") ||
                l.includes("p50") ||
                l.includes("p60") ||
                l.includes("p55") ||
                l.includes("p70") ||
                l.includes("onda") ||
                /\d+\s*[xX]\s*\d+/.test(linha)
            );
        });
}

function mostrarLinhas(linhas){
    if(linhas.length === 0){
        linhasPedidoDiv.innerHTML = "Nenhuma linha provável encontrada.";
        return;
    }

    linhasPedidoDiv.innerHTML = linhas.map(l => {
        return `<div class="linha">${escapeHtml(l)}</div>`;
    }).join("");
}

function extrairPedidos(texto){
    const normal = texto
        .replace(/[–—]/g, "-")
        .replace(/\s+/g, " ")
        .trim();

    let pedidos = [];
    pedidos = pedidos.concat(extrairModeloPCBOX(normal));
    pedidos = pedidos.concat(extrairModeloAbapel(normal));
    pedidos = pedidos.concat(extrairModeloFavinco(normal));
    pedidos = pedidos.concat(extrairModeloChapaLinha(normal));

    pedidos.forEach(p => {
        if(p.onda === undefined || p.gramatura === undefined){
            const og = extrairOndaGramatura(p.papel || "");
            if(p.onda === undefined) p.onda = og.onda;
            if(p.gramatura === undefined) p.gramatura = og.gramatura;
        }
    });

    return limparDuplicados(pedidos);
}

function extrairModeloAbapel(texto){
    const pedidos = [];

    const regex = /(?:^|\s)(\d{1,2})\s+\d{2}\/\d{2}\/\d{4}\s+Chapa\s+([\d.,]+)\s+(\d{2,4})\s*[xX]\s*(\d{2,4})\s+(P\d{2}[A-Z]?|P\d{2})/gi;

    let m;
    while((m = regex.exec(texto)) !== null){
        pedidos.push({
            of: procurarOFProximo(texto, m.index),
            quantidade: limparNumero(m[2]),
            largura: limparNumero(m[3]),
            comprimento: limparNumero(m[4]),
            papel: m[5],
            vinco: procurarVincoProximo(texto, m.index)
        });
    }

    return pedidos;
}

function extrairModeloFavinco(texto){
    const pedidos = [];

    const regex = /(\d{2,6})\s+chap\w*\s+(P\d{2}[-\s]?[A-Z]?)\s+onda\s+([A-Z]{1,2})\s+([\d.]+)\s*[xX]\s*([\d.]+)(?:\s+vinco\s+([\dxX]+))?(?:\s*\([^)]*?(\d+)\))?/gi;

    let m;
    while((m = regex.exec(texto)) !== null){
        pedidos.push({
            of: "",
            quantidade: limparNumero(m[1]),
            largura: limparNumero(m[4]),
            comprimento: limparNumero(m[5]),
            papel: limparTexto(m[2]),
            onda: limparTexto(m[3]),
            gramatura: "",
            vinco: m[6] ? limparTexto(m[6]) : "",
            ino: m[7] || ""
        });
    }

    return pedidos;
}

function extrairModeloChapaLinha(texto){
    const pedidos = [];

    const regex = /Chapa\s+\d+\s*-\s*(\d{2,4})\s*[xX]\s*(\d{2,4})(.*?)(?=Chapa\s+\d+\s*-|$)/gi;

    let m;
    while((m = regex.exec(texto)) !== null){
        const bloco = m[3];

        const qtd = (bloco.match(/Quantidade[:\s]+(\d{1,6})/i) || [])[1] || "";
        const papel = (bloco.match(/Modelo\s+Papel[aã]o[:\s]+([A-Z0-9\s-]+)/i) || [])[1] || "";
        const onda = (bloco.match(/Tipo\s+de\s+Onda[:\s]+([A-Z]{1,2})/i) || [])[1] || "";
        const vinco = (bloco.match(/vincos?\s+([\d\s*xX]+)/i) || [])[1] || "";

        pedidos.push({
            of: "",
            quantidade: qtd,
            largura: limparNumero(m[1]),
            comprimento: limparNumero(m[2]),
            papel: limparTexto(papel),
            onda: limparTexto(onda),
            vinco: limparTexto(vinco)
        });
    }

    return pedidos;
}

function extrairModeloPCBOX(texto){
    const pedidos = [];

    const numeroPedido = (texto.match(/N[úu]mero\.?:?\s*([\d.,]+)/i) || [])[1] || "";

    const regex = /(\d{1,2})\s+\d{2}\/\d{2}\/\d{4}\s+Chapa\s+([\d.,]+)\s+([\d.]+)\s*[xX]\s*([\d.]+)\s+(.+?)(?=\s+\d+[.,]\d{3}\b|\s+Gr\.|\s+Vincos|\s+OF[:\s]|$)/gi;

    let m;
    while((m = regex.exec(texto)) !== null){
        const janela = texto.slice(m.index, m.index + 400);

        const of = (janela.match(/OF[:\s]*\.?\s*(\d{3,8})/i) || [])[1] || "";
        const vinco = (janela.match(/Vincos?[:\s]*([\d\s*xX]+)/i) || [])[1] || "";

        const papelBruto = limparTexto(m[5]);
        const og = extrairOndaGramatura(papelBruto);
        const papelLimpo = papelBruto
            .replace(/\b[A-Z]{1,2}\s+\d{2,4}\s*[Gg]\b/, " ")
            .replace(/\s+/g, " ")
            .trim();

        pedidos.push({
            of: of || numeroPedido,
            quantidade: limparNumero(m[2]),
            largura: limparNumero(m[3]),
            comprimento: limparNumero(m[4]),
            papel: papelLimpo,
            onda: og.onda,
            gramatura: og.gramatura,
            vinco: limparTexto(vinco)
        });
    }

    return pedidos;
}

function procurarOFProximo(texto, posicao){
    const janela = texto.slice(posicao, posicao + 250);
    const m = janela.match(/OF[:\s]*\.?\s*(\d{4,8})/i);
    return m ? m[1] : "";
}

function procurarVincoProximo(texto, posicao){
    const janela = texto.slice(posicao, posicao + 220);
    const m = janela.match(/Vincos?[:\s]*([\d\s*xX]+)/i);
    return m ? limparTexto(m[1]) : "";
}

function extrairOndaGramatura(papel){
    const t = limparTexto(papel);

    let onda = (t.match(/\b([A-Z]{1,2})\s+\d{2,4}\s*[Gg]\b/) || [])[1] || "";
    if(!onda){
        onda = (t.match(/onda\s+([A-Z]{1,2})\b/i) || [])[1] || "";
    }

    const gramatura = (t.match(/(\d{2,4})\s*[Gg]\b/) || [])[1] || "";

    return { onda, gramatura };
}

function mostrarPedidos(pedidos){
    if(pedidos.length === 0){
        tabelaPedidos.innerHTML = `
            <tr>
                <td colspan="10">Nenhum pedido estruturado encontrado.</td>
            </tr>
        `;
        return;
    }

    tabelaPedidos.innerHTML = pedidos.map(p => `
        <tr>
            <td>${escapeHtml(p.pagina || "")}</td>
            <td>${escapeHtml(p.of || "")}</td>
            <td>${escapeHtml(p.quantidade || "")}</td>
            <td>${escapeHtml(p.largura || "")}</td>
            <td>${escapeHtml(p.comprimento || "")}</td>
            <td>${escapeHtml(p.papel || "")}</td>
            <td>${escapeHtml(p.onda || "")}</td>
            <td>${escapeHtml(p.gramatura || "")}</td>
            <td>${escapeHtml(p.vinco || "")}</td>
            <td>${escapeHtml(p.ino || "")}</td>
        </tr>
    `).join("");
}

function limparDuplicados(pedidos){
    const mapa = new Map();

    pedidos.forEach(p => {
        const chave = [
            p.of,
            p.quantidade,
            p.largura,
            p.comprimento,
            p.papel,
            p.vinco,
            p.ino || ""
        ].join("|");

        if(!mapa.has(chave)){
            mapa.set(chave, p);
        }
    });

    return [...mapa.values()];
}

function limparNumero(valor){
    if(!valor) return "";
    return String(valor).replace(/[^\d]/g, "");
}

function limparTexto(valor){
    if(!valor) return "";
    return String(valor).replace(/\s+/g, " ").trim();
}

function escapeHtml(texto){
    return String(texto)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}
</script>

</body>
</html>
